<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆桌 · 混合讨论室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e14; --surface:#16161f; --surface2:#1e1e2a;
  --border:#2a2a3a; --text:#e8e8f0; --muted:#5a5a7a;
  --gold:#e8b84b; --gold-dim:#2a2210;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* SETUP */
#setupScreen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 50%,#1a1a2e,var(--bg) 70%);}
.setup-box{width:100%;max-width:660px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;max-height:90vh;overflow-y:auto;}
.setup-box::-webkit-scrollbar{width:4px;}
.setup-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.logo{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:4px;color:var(--gold);margin-bottom:6px;}
.setup-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;margin-top:20px;}
.identity-row{display:flex;gap:8px;}
.identity-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Noto Serif SC',serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.identity-input:focus{border-color:var(--gold);}
.role-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Noto Serif SC',serif;font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.agents-grid{display:flex;flex-direction:column;gap:7px;}
.agent-card{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none;}
.agent-card:hover{border-color:var(--agent-color);}
.agent-card.on{border-color:var(--agent-color);background:color-mix(in srgb,var(--agent-color) 8%,var(--surface2));}
.check-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .2s;}
.agent-card.on .check-circle{background:var(--agent-color);border-color:var(--agent-color);color:#000;}
.agent-emoji{font-size:17px;flex-shrink:0;}
.agent-card-name{font-size:13px;font-weight:600;}
.agent-card-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.topic-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'Noto Serif SC',serif;font-size:14px;color:var(--text);resize:none;outline:none;height:76px;line-height:1.6;transition:border-color .2s;}
.topic-input:focus{border-color:var(--gold);}
.quick-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.qtag{font-size:12px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;transition:all .2s;}
.qtag:hover{border-color:var(--gold);color:var(--gold);}
.enter-btn{width:100%;margin-top:22px;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.enter-btn:hover{background:#f0c45a;}
.enter-btn:disabled{opacity:.4;cursor:not-allowed;}

/* CHAT */
#chatScreen{flex:1;display:none;flex-direction:column;overflow:hidden;}
.chat-header{padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.topic-display{font-size:13px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Serif SC',serif;transition:all .2s;flex-shrink:0;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.member-pips{display:flex;}
.pip{width:26px;height:26px;border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:-5px;background:var(--surface2);}

.messages{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:2px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg-group{margin-bottom:14px;}
.msg-row{display:flex;gap:10px;align-items:flex-end;}
.msg-row.me{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--c);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:color-mix(in srgb,var(--c) 12%,var(--surface));}
.bubble{max-width:70%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.7;color:var(--text);animation:pop .2s ease;}
.bubble.ai{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px;}
.bubble.me{background:var(--gold-dim);border:1px solid var(--gold);border-bottom-right-radius:3px;color:var(--gold);}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.bubble-name{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;margin-bottom:4px;}
.bubble strong{color:#fff;}
.sys{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:6px 0;letter-spacing:1px;}
.typing-row{display:flex;gap:10px;align-items:center;margin-bottom:6px;}
.typing-bub{background:var(--surface2);border:1px solid var(--border);padding:9px 14px;border-radius:14px;border-bottom-left-radius:3px;display:inline-flex;gap:4px;align-items:center;}
.typing-bub span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bop 1.2s infinite;}
.typing-bub span:nth-child(2){animation-delay:.2s;}
.typing-bub span:nth-child(3){animation-delay:.4s;}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* INPUT */
.input-area{padding:14px 18px;background:var(--surface);border-top:1px solid var(--border);}
.speaker-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.pill{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:transparent;font-family:'Noto Serif SC',serif;color:var(--muted);transition:all .2s;}
.pill.active{background:var(--c);border-color:var(--c);color:#000;font-weight:600;}
.pill:hover:not(.active){border-color:var(--c);color:var(--c);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.msg-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-family:'Noto Serif SC',serif;font-size:14px;color:var(--text);outline:none;resize:none;line-height:1.5;max-height:100px;transition:border-color .2s;}
.msg-input:focus{border-color:var(--gold);}
.msg-input::placeholder{color:var(--muted);}
.ai-btn{padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Serif SC',serif;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.ai-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.ai-btn:disabled{opacity:.3;cursor:not-allowed;}
.send-btn{width:40px;height:40px;background:var(--gold);border:none;border-radius:10px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.send-btn:hover{background:#f0c45a;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupScreen">
 <div class="setup-box">
  <div class="logo">圆桌 // Roundtable</div>
  <div class="setup-title">组建你的讨论小组</div>
  <div class="setup-sub">你不是观众，你是参与者。选好顾问，设定角色，一起讨论——AI会回应你，也会互相争论。</div>

  <div class="section-label">你是谁</div>
  <div class="identity-row">
   <input class="identity-input" id="userName" placeholder="你的名字" value="我">
   <select class="role-select" id="userRole">
    <option>创始人</option><option>产品经理</option><option>投资人</option>
    <option>开发者</option><option>运营</option><option>学生</option>
   </select>
  </div>

  <div class="section-label">选择AI顾问（至少1位）</div>
  <div class="agents-grid" id="agentsGrid"></div>

  <div class="section-label">讨论议题</div>
  <textarea class="topic-input" id="topicInput" placeholder="你想讨论什么？输入你的商业问题或项目想法..."></textarea>
  <div class="quick-tags">
   <span class="qtag" onclick="setTopic('AI圆桌讨论平台，多模型协作，订阅制，面向创业者')">AI圆桌平台</span>
   <span class="qtag" onclick="setTopic('一人公司做SaaS产品，如何冷启动找到第一批付费用户')">一人公司SaaS</span>
   <span class="qtag" onclick="setTopic('AI App分发平台，类似Hao123+Steam，个人开发者生态')">App分发市场</span>
   <span class="qtag" onclick="setTopic('缠论AI交易助手，面向A股散户，订阅制，如何突破合规障碍')">缠论交易助手</span>
  </div>

  <button class="enter-btn" id="enterBtn" onclick="enterChat()">进入讨论室 →</button>
 </div>
</div>

<!-- CHAT -->
<div id="chatScreen">
 <div class="chat-header">
  <button class="back-btn" onclick="backToSetup()">← 重设</button>
  <div class="topic-display" id="headerTopic"></div>
  <div class="member-pips" id="memberPips"></div>
 </div>
 <div class="messages" id="messages"></div>
 <div class="input-area">
  <div class="speaker-label">以谁的身份发言</div>
  <div class="pills" id="pills"></div>
  <div class="input-row">
   <textarea class="msg-input" id="msgInput" placeholder="输入你的观点，按 Enter 发送..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
   <button class="ai-btn" id="aiBtn" onclick="aiRespond()">💬 AI回应</button>
   <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
  </div>
 </div>
</div>

<script>
const AGENTS = [
 {id:'strategist',name:'战略顾问',emoji:'🎯',color:'#e8b84b',desc:'商业模式·市场定位·竞争分析',
  sys:'你是顶级商业战略顾问，在一个群组讨论中。思维犀利，不捧场，直接说真实判断。会针对任何人的发言给出战略视角。150字以内。'},
 {id:'growth',name:'增长黑客',emoji:'🚀',color:'#4ec9b0',desc:'获客·留存·病毒传播',
  sys:'你是增长黑客，在一个群组讨论中。专注用户获取和变现，关注PMF。针对发言给出增长视角，不捧场。150字以内。'},
 {id:'investor',name:'风投顾问',emoji:'💰',color:'#569cd6',desc:'估值·融资·商业模式',
  sys:'你是经验丰富的VC，在一个群组讨论中。从投资角度评估，关注市场规模和护城河，敢于直接质疑。150字以内。'},
 {id:'operator',name:'运营专家',emoji:'⚙️',color:'#c586c0',desc:'执行·用户体验·落地细节',
  sys:'你是产品运营专家，在一个群组讨论中。关注执行细节，发现理想化方案的坑，提供务实建议。150字以内。'},
 {id:'devil',name:'魔鬼代言',emoji:'😈',color:'#f44747',desc:'挑战假设·找漏洞·反向思考',
  sys:'你是魔鬼代言人，在一个群组讨论中。专门找最新发言的盲点和假设漏洞，尖锐直接，不留情面。150字以内。'},
];

let selected = ['strategist','devil'];
let speaker = 'user';
let thinking = false;
let history = [];
let uName='我', uRole='创始人', topic='';

function initGrid(){
 document.getElementById('agentsGrid').innerHTML = AGENTS.map(a=>`
  <div class="agent-card ${selected.includes(a.id)?'on':''}" id="c-${a.id}" style="--agent-color:${a.color}" onclick="toggle('${a.id}')">
   <div class="check-circle">${selected.includes(a.id)?'✓':''}</div>
   <div class="agent-emoji">${a.emoji}</div>
   <div><div class="agent-card-name" style="color:${selected.includes(a.id)?a.color:'var(--text)'}">${a.name}</div><div class="agent-card-desc">${a.desc}</div></div>
  </div>`).join('');
}

function toggle(id){
 if(selected.includes(id)){if(selected.length<=1)return;selected=selected.filter(x=>x!==id);}
 else selected.push(id);
 initGrid();
}

function setTopic(t){document.getElementById('topicInput').value=t;}

function getActive(){return AGENTS.filter(a=>selected.includes(a.id));}

function enterChat(){
 uName=document.getElementById('userName').value.trim()||'我';
 uRole=document.getElementById('userRole').value;
 topic=document.getElementById('topicInput').value.trim();
 if(!topic){document.getElementById('topicInput').focus();return;}

 document.getElementById('setupScreen').style.display='none';
 document.getElementById('chatScreen').style.display='flex';
 document.getElementById('headerTopic').textContent=topic;

 // member pips
 document.getElementById('memberPips').innerHTML=
  `<div class="pip" style="border-color:var(--gold)">${uName[0]}</div>`+
  getActive().map(a=>`<div class="pip" style="border-color:${a.color}">${a.emoji}</div>`).join('');

 // pills
 document.getElementById('pills').innerHTML=
  `<button class="pill active" id="p-user" style="--c:var(--gold)" onclick="setSpeaker('user')">👤 ${uName}</button>`+
  getActive().map(a=>`<button class="pill" id="p-${a.id}" style="--c:${a.color}" onclick="setSpeaker('${a.id}')">${a.emoji} ${a.name}</button>`).join('');

 addSys(`讨论室已开启 · ${getActive().length+1}位参与者`);
 addSys(`议题：${topic}`);

 // First AI opens discussion
 setTimeout(()=>aiRespond(true),700);
}

function backToSetup(){
 document.getElementById('chatScreen').style.display='none';
 document.getElementById('setupScreen').style.display='flex';
 document.getElementById('messages').innerHTML='';
 history=[];
}

function setSpeaker(id){
 speaker=id;
 document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
 document.getElementById(`p-${id}`)?.classList.add('active');
 document.getElementById('msgInput').focus();
}

function addSys(t){
 const d=document.createElement('div');d.className='sys';d.textContent=t;
 document.getElementById('messages').appendChild(d);scroll();
}

function addMsg(speakerId,text){
 const isMe=speakerId==='user';
 const a=AGENTS.find(x=>x.id===speakerId);
 const c=isMe?'var(--gold)':a?.color||'#888';
 const em=isMe?uName[0]:a?.emoji||'?';
 const nm=isMe?`${uName} · ${uRole}`:a?.name||speakerId;

 const g=document.createElement('div');g.className='msg-group';
 const row=document.createElement('div');row.className=`msg-row${isMe?' me':''}`;
 row.style.setProperty('--c',c);
 row.innerHTML=`
  <div class="av" style="border-color:${c};--c:${c}">${em}</div>
  <div class="bubble ${isMe?'me':'ai'}">
   <div class="bubble-name" style="color:${c}">${nm}</div>
   ${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
  </div>`;
 g.appendChild(row);
 document.getElementById('messages').appendChild(g);
 history.push({who:nm,text,isMe});
 scroll();
}

function addTyping(a){
 const row=document.createElement('div');row.className='typing-row';row.id='typing';
 row.innerHTML=`<div class="av" style="border-color:${a.color};--c:${a.color};opacity:.5">${a.emoji}</div><div class="typing-bub"><span></span><span></span><span></span></div>`;
 document.getElementById('messages').appendChild(row);scroll();
}
function removeTyping(){document.getElementById('typing')?.remove();}

function scroll(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function send(){
 const input=document.getElementById('msgInput');
 const text=input.value.trim();
 if(!text||thinking)return;
 addMsg(speaker,text);
 input.value='';input.style.height='auto';
 if(speaker==='user') setTimeout(()=>aiRespond(),600);
}

async function aiRespond(opening=false){
 if(thinking)return;
 thinking=true;
 document.getElementById('aiBtn').disabled=true;
 document.getElementById('sendBtn').disabled=true;

 const active=getActive();
 // 1 or 2 agents respond naturally
 const count=opening?Math.min(2,active.length):1+Math.floor(Math.random()*Math.min(2,active.length));
 const picks=[...active].sort(()=>Math.random()-.5).slice(0,count);

 const histText=history.slice(-8).map(m=>`【${m.who}】${m.text}`).join('\n');
 const ctx=opening
  ?`这是一个商业决策讨论群组。\n议题：${topic}\n参与者：${uName}（${uRole}）+ AI顾问们。\n请开启讨论，说出你对这个议题的第一判断，不要客套。`
  :`这是一个商业决策讨论群组。\n议题：${topic}\n\n最近的讨论记录：\n${histText}\n\n请自然地回应最新的发言，可以同意/反驳/补充/追问。不要重复别人说过的内容。`;

 for(const a of picks){
  addTyping(a);
  await sleep(500+Math.random()*500);
  try{
   const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:a.sys,messages:[{role:'user',content:ctx}]})});
   const data=await res.json();
   removeTyping();
   if(data.text)addMsg(a.id,data.text);
  }catch(e){removeTyping();addMsg(a.id,'（网络错误，请重试）');}
  await sleep(300);
 }

 thinking=false;
 document.getElementById('aiBtn').disabled=false;
 document.getElementById('sendBtn').disabled=false;
}

initGrid();
</script>
</body>
</html>
